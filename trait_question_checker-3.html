<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trait Questions Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .controls {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .file-upload {
            display: inline-block;
            margin-right: 20px;
            margin-bottom: 10px;
        }
        .file-upload label {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-block;
        }
        .file-upload label:hover {
            background: #45a049;
        }
        .file-upload input[type="file"] {
            display: none;
        }
        .status {
            display: inline-block;
            margin-left: 10px;
            color: #666;
            font-style: italic;
        }
        .section {
            background: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .output {
            background: #fafafa;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
        }
        .combo {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .combo-header {
            font-weight: bold;
            color: #2196F3;
            margin-bottom: 8px;
        }
        .question {
            margin: 5px 0;
        }
        .prompt {
            color: #666;
            font-style: italic;
            margin: 5px 0;
        }
        u {
            color: #d32f2f;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Trait Questions Checker</h1>

    <div class="controls">
        <h2>Load Data Files</h2>
        <p style="color: #666; margin-bottom: 15px;">⚠️ Du skal først loade begge filer før du kan se spørgsmålene</p>
        <div class="file-upload">
            <label for="traitsFile">Load Traits Library
                <input type="file" id="traitsFile" accept=".json">
            </label>
            <span class="status" id="traitsStatus">Ikke loaded</span>
        </div>
        <div class="file-upload">
            <label for="questionsFile">Load Questions Library
                <input type="file" id="questionsFile" accept=".json">
            </label>
            <span class="status" id="questionsStatus">Ikke loaded</span>
        </div>
    </div>

    <div class="section">
        <h2>Value Other</h2>
        <select id="select_value_other">
            <option value="">Vælg et spørgsmål...</option>
        </select>
        <div class="output" id="output_value_other"></div>
    </div>

    <div class="section">
        <h2>Value Self</h2>
        <select id="select_value_self">
            <option value="">Vælg et spørgsmål...</option>
        </select>
        <div class="output" id="output_value_self"></div>
    </div>

    <div class="section">
        <h2>Resource</h2>
        <select id="select_resource">
            <option value="">Vælg et spørgsmål...</option>
        </select>
        <div class="output" id="output_resource"></div>
    </div>

    <div class="section">
        <h2>Opening</h2>
        <select id="select_opening">
            <option value="">Vælg et spørgsmål...</option>
        </select>
        <div class="output" id="output_opening"></div>
    </div>

    <script>
        // Initialize empty - must load from files
        let traits = [];
        let questions = {};

        // File loading functionality
        function parseQuestionsFromProjectFile(data) {
            const parsed = {};
            
            // Find nodes in the session.nodes array
            if (data.session && data.session.nodes) {
                data.session.nodes.forEach(node => {
                    if (node.questions && Array.isArray(node.questions)) {
                        const categoryQuestions = [];
                        
                        node.questions.forEach(questionText => {
                            // Split by \n to separate template from prompt
                            const parts = questionText.split('\n');
                            if (parts.length >= 2) {
                                categoryQuestions.push({
                                    template: parts[0],
                                    prompt: parts.slice(1).join('\n')
                                });
                            } else {
                                // If no \n, treat entire text as template
                                categoryQuestions.push({
                                    template: questionText,
                                    prompt: ''
                                });
                            }
                        });
                        
                        // Use node.id as category name
                        if (categoryQuestions.length > 0 && node.id !== 'start' && node.id !== 'tak') {
                            parsed[node.id] = categoryQuestions;
                        }
                    }
                });
            }
            
            return parsed;
        }

        document.getElementById('questionsFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            console.log('Loading questions file:', file.name, 'Size:', file.size, 'Last modified:', file.lastModified);
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    console.log('Raw questions data:', data);
                    
                    const parsedQuestions = parseQuestionsFromProjectFile(data);
                    console.log('Parsed questions:', parsedQuestions);
                    
                    if (Object.keys(parsedQuestions).length > 0) {
                        questions = parsedQuestions;
                        document.getElementById('questionsStatus').textContent = `✓ Loaded ${Object.keys(parsedQuestions).length} categories (${new Date().toLocaleTimeString()})`;
                        document.getElementById('questionsStatus').style.color = '#4CAF50';
                        populateDropdowns();
                        
                        // Refresh any displayed combinations with the new questions
                        let refreshCount = 0;
                        ['value_other', 'value_self', 'resource', 'opening'].forEach(category => {
                            const select = document.getElementById(`select_${category}`);
                            if (select.value !== '') {
                                console.log(`Refreshing ${category} with new questions`);
                                generateCombinations(category, parseInt(select.value));
                                refreshCount++;
                            }
                        });
                        console.log(`Refreshed ${refreshCount} categories with new questions`);
                    } else {
                        document.getElementById('questionsStatus').textContent = '⚠ No questions found';
                        document.getElementById('questionsStatus').style.color = '#ff9800';
                        console.warn('No questions found in file');
                    }
                } catch (error) {
                    document.getElementById('questionsStatus').textContent = `✗ Error: ${error.message}`;
                    document.getElementById('questionsStatus').style.color = '#f44336';
                    console.error('Error parsing questions file:', error);
                }
            };
            reader.readAsText(file);
            
            // Clear the input so the same file can be loaded again
            e.target.value = '';
        });

        document.getElementById('traitsFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            console.log('Loading traits file:', file.name, 'Size:', file.size, 'Last modified:', file.lastModified);
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    
                    // Validate that it's an array
                    if (!Array.isArray(data)) {
                        throw new Error('Traits file must be an array');
                    }
                    
                    // Validate trait structure
                    if (data.length > 0) {
                        const firstTrait = data[0];
                        if (!firstTrait.id || !firstTrait.left || !firstTrait.right) {
                            throw new Error('Invalid trait structure');
                        }
                    }
                    
                    traits = data;
                    console.log('✓ Traits loaded successfully:', traits.length, 'traits');
                    console.log('First trait:', traits[0]);
                    console.log('Last trait:', traits[traits.length - 1]);
                    
                    document.getElementById('traitsStatus').textContent = `✓ Loaded ${data.length} traits (${new Date().toLocaleTimeString()})`;
                    document.getElementById('traitsStatus').style.color = '#4CAF50';
                    
                    // Refresh any displayed combinations
                    let refreshCount = 0;
                    ['value_other', 'value_self', 'resource', 'opening'].forEach(category => {
                        const select = document.getElementById(`select_${category}`);
                        console.log(`Checking ${category}: select.value = "${select.value}"`);
                        if (select.value !== '') {
                            console.log(`Refreshing ${category} with question index ${select.value}`);
                            generateCombinations(category, parseInt(select.value));
                            refreshCount++;
                        }
                    });
                    console.log(`Refreshed ${refreshCount} categories`);
                    
                } catch (error) {
                    document.getElementById('traitsStatus').textContent = `✗ Error: ${error.message}`;
                    document.getElementById('traitsStatus').style.color = '#f44336';
                    console.error('Error loading traits file:', error);
                }
            };
            reader.readAsText(file);
            
            // Clear the input so the same file can be loaded again
            e.target.value = '';
        });

        // Track if event listeners have been added
        let eventListenersAdded = false;
        
        function populateDropdowns() {
            ['value_other', 'value_self', 'resource', 'opening'].forEach(category => {
                const select = document.getElementById(`select_${category}`);
                const currentValue = select.value; // Remember current selection
                
                // Clear existing options except the first one
                select.innerHTML = '<option value="">Vælg et spørgsmål...</option>';
                
                // Check if questions exist for this category
                if (!questions[category] || !Array.isArray(questions[category])) {
                    console.warn(`No questions found for category: ${category}`);
                    return;
                }
                
                questions[category].forEach((q, idx) => {
                    const option = document.createElement('option');
                    option.value = idx;
                    option.textContent = `${idx + 1}. ${q.template}`;
                    select.appendChild(option);
                });
                
                // Restore previous selection if it still exists
                if (currentValue && select.options[parseInt(currentValue) + 1]) {
                    select.value = currentValue;
                }

                // Only add event listeners once
                if (!eventListenersAdded) {
                    select.addEventListener('change', (e) => {
                        if (e.target.value !== '') {
                            generateCombinations(category, parseInt(e.target.value));
                        } else {
                            document.getElementById(`output_${category}`).innerHTML = '';
                        }
                    });
                }
            });
            eventListenersAdded = true;
        }

        function underline(text) {
            return `<u>${text}</u>`;
        }

        function replaceVariables(template, userSide, otherSide, trait) {
            let result = template;
            
            // Replace userSide variables with underlined text (support both {{}} and {} formats)
            result = result.replace(/\{\{?userSide_name\}\}?/g, 'MadsOle');
            result = result.replace(/\{\{?userSide_du\}\}?/g, underline(userSide.du));
            result = result.replace(/\{\{?userSide_at\}\}?/g, underline(userSide.at));
            result = result.replace(/\{\{?userSide_når\}\}?/g, underline(userSide.når));
            result = result.replace(/\{\{?userSide_noun\}\}?/g, underline(userSide.noun));
            
            // Replace otherSide variables with underlined text (support both {{}} and {} formats)
            result = result.replace(/\{\{?otherSide_name\}\}?/g, 'Ideal');
            result = result.replace(/\{\{?otherSide_du\}\}?/g, underline(otherSide.du));
            result = result.replace(/\{\{?otherSide_at\}\}?/g, underline(otherSide.at));
            result = result.replace(/\{\{?otherSide_når\}\}?/g, underline(otherSide.når));
            result = result.replace(/\{\{?otherSide\.noun\}\}?/g, underline(otherSide.noun));
            result = result.replace(/\{\{?otherSide_noun\}\}?/g, underline(otherSide.noun));
            
            return result;
        }

        function generateCombinations(category, questionIndex) {
            const output = document.getElementById(`output_${category}`);
            
            // Validate data
            if (!questions[category] || !questions[category][questionIndex]) {
                output.innerHTML = '<div style="color: red;">Error: Question not found</div>';
                console.error('Question not found:', category, questionIndex);
                return;
            }
            
            if (!traits || traits.length === 0) {
                output.innerHTML = '<div style="color: red;">Error: No traits loaded. Please load a traits file first.</div>';
                console.error('No traits loaded');
                return;
            }
            
            const question = questions[category][questionIndex];
            let html = '';
            let counter = 1;

            traits.forEach(trait => {
                // Combination 1: userSide = left, otherSide = right
                const userSide1 = trait.left;
                const otherSide1 = trait.right;
                
                html += `<div class="combo">`;
                html += `<div class="combo-header">${counter}. ${trait.id.charAt(0).toUpperCase() + trait.id.slice(1)} (MadsOle: ${underline(userSide1.slider_label)} / Ideal: ${underline(otherSide1.slider_label)})</div>`;
                html += `<div class="question">${replaceVariables(question.template, userSide1, otherSide1, trait)}</div>`;
                html += `<div class="prompt">Prompt: ${question.prompt}</div>`;
                html += `</div>`;
                counter++;

                // Combination 2: userSide = right, otherSide = left
                const userSide2 = trait.right;
                const otherSide2 = trait.left;
                
                html += `<div class="combo">`;
                html += `<div class="combo-header">${counter}. ${trait.id.charAt(0).toUpperCase() + trait.id.slice(1)} (MadsOle: ${underline(userSide2.slider_label)} / Ideal: ${underline(otherSide2.slider_label)})</div>`;
                html += `<div class="question">${replaceVariables(question.template, userSide2, otherSide2, trait)}</div>`;
                html += `<div class="prompt">Prompt: ${question.prompt}</div>`;
                html += `</div>`;
                counter++;
            });

            output.innerHTML = html;
        }

        // Don't populate dropdowns on load - wait for files to be loaded
    </script>
</body>
</html>
